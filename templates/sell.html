{% extends "base.html" %}

{% block page_title %}Billing & Sell{% endblock %}

{% block content %}
<div class="sell-container">
    <div class="card item-selection-section">
        <h3 class="card-title">Add to Cart</h3>
        <form id="add-to-cart-form" class="unified-form">
            <div class="form-row">
                <div class="form-group flex-2">
                    <label>Select Item</label>
                    <select id="sale-item" required class="form-input">
                        <option value="" disabled selected>Loading inventory...</option>
                    </select>
                </div>
                <div class="form-group flex-1">
                    <label>Quantity</label>
                    <input type="number" id="sale-quantity" min="1" value="1" required class="form-input">
                </div>
            </div>
            <button type="submit" class="btn btn-secondary">Add Item</button>
        </form>
    </div>

    <div class="card cart-section">
        <h3 class="card-title">Current Cart</h3>
        <div class="table-responsive">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Qty</th>
                        <th>Price/Unit (₹)</th>
                        <th>Total (₹)</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="cart-tbody">
                    <!-- Cart items injected here -->
                    <tr><td colspan="5" style="text-align: center;">Cart is empty</td></tr>
                </tbody>
            </table>
        </div>

        <div class="billing-summary">
            <div class="form-group discount-group">
                <label>Discount (%)</label>
                <input type="number" id="sale-discount" min="0" max="100" value="0" class="form-input discount-input">
            </div>
            <div class="totals">
                <p><span>Subtotal:</span> <span id="summary-subtotal">₹0.00</span></p>
                <p><span>Discount:</span> <span id="summary-discount">-₹0.00</span></p>
                <p><span>GST (18%):</span> <span id="summary-gst">₹0.00</span></p>
                <hr>
                <h3 class="grand-total"><span>Total:</span> <span id="summary-total">₹0.00</span></h3>
            </div>
        </div>

        <button id="checkout-btn" class="btn btn-primary btn-block btn-lg" disabled>Checkout & Generate Bill</button>
    </div>
</div>
{% endblock %}
